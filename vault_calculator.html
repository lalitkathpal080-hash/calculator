
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --calc-bg: #202124;
    --display-bg: #202124;
    --btn-dark: #3c4043;
    --btn-mid: #5f6368;
    --btn-orange: #f08c00;
    --btn-light: #dadce0;
    --text-white: #ffffff;
    --text-dark: #202124;
    --accent: #1a73e8;
  }
  body { background: transparent; display: flex; justify-content: center; padding: 1rem 0; }
  #app { width: 360px; font-family: 'Google Sans', 'Roboto', sans-serif; }

  /* SETUP SCREEN */
  #setup-screen {
    background: #202124; border-radius: 28px; padding: 32px 24px;
    color: white; text-align: center; min-height: 540px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .setup-logo { font-size: 48px; margin-bottom: 8px; }
  .setup-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .setup-subtitle { font-size: 13px; color: #9aa0a6; margin-bottom: 32px; line-height: 1.5; }
  .pin-dots { display: flex; gap: 16px; margin-bottom: 24px; justify-content: center; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #5f6368; transition: all 0.2s; }
  .pin-dot.filled { background: #f08c00; border-color: #f08c00; transform: scale(1.1); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-btn {
    height: 64px; border-radius: 50%; border: none; background: #3c4043;
    color: white; font-size: 22px; font-weight: 400; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .pin-btn:active { background: #5f6368; transform: scale(0.93); }
  .pin-btn.del { font-size: 18px; background: transparent; }
  .pin-btn.zero { grid-column: 2; }
  .pin-btn.confirm {
    background: #1a73e8; font-size: 14px; border-radius: 32px;
    width: 100%; height: 48px; margin-top: 8px; grid-column: 1 / -1;
  }
  .setup-step { font-size: 13px; color: #9aa0a6; margin-bottom: 16px; }
  .error-msg { color: #f28b82; font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* CALCULATOR */
  #calculator { background: #202124; border-radius: 28px; overflow: hidden; display: none; min-height: 540px; }
  .calc-display {
    background: #202124; padding: 16px 24px 8px;
    display: flex; flex-direction: column; align-items: flex-end; min-height: 160px; justify-content: flex-end;
  }
  .calc-history { font-size: 20px; color: #9aa0a6; min-height: 28px; margin-bottom: 4px; text-align: right; word-break: break-all; }
  .calc-current { font-size: 56px; color: #e8eaed; font-weight: 300; line-height: 1.1; text-align: right; word-break: break-all; transition: font-size 0.1s; }
  .calc-current.small { font-size: 36px; }
  .calc-current.pin-mode { color: #f08c00; }
  .calc-buttons { background: #303134; }
  .calc-row { display: flex; }
  .calc-btn {
    flex: 1; height: 72px; border: none; cursor: pointer;
    font-size: 22px; font-weight: 400; transition: opacity 0.1s, transform 0.1s;
    position: relative; overflow: hidden;
  }
  .calc-btn:active { opacity: 0.7; transform: scale(0.95); }
  .btn-func { background: #3c4043; color: #e8eaed; }
  .btn-op { background: #5f6368; color: #e8eaed; }
  .btn-num { background: #303134; color: #e8eaed; }
  .btn-eq { background: #f08c00; color: #ffffff; }
  .btn-zero { flex: 2; text-align: left; padding-left: 28px; }

  /* VAULT SCREEN */
  #vault-screen {
    background: #202124; border-radius: 28px; padding: 0; display: none; min-height: 540px;
    flex-direction: column; color: white; overflow: hidden;
  }
  .vault-header {
    background: #1a73e8; padding: 20px 20px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .vault-header-back {
    background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 4px 8px;
  }
  .vault-header-title { font-size: 18px; font-weight: 500; flex: 1; }
  .vault-add-btn {
    background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 20px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .vault-apps { padding: 16px; flex: 1; }
  .vault-section-title { font-size: 11px; color: #9aa0a6; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 8px; margin-bottom: 24px; }
  .app-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .app-icon {
    width: 56px; height: 56px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    position: relative;
  }
  .app-icon-label { font-size: 11px; color: #e8eaed; text-align: center; line-height: 1.2; max-width: 60px; word-break: break-word; }
  .app-icon .badge {
    position: absolute; top: -4px; right: -4px; background: #f28b82;
    border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
    display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;
  }
  .add-app-card {
    width: 56px; height: 56px; border-radius: 14px;
    border: 2px dashed #5f6368; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #9aa0a6; font-size: 28px; transition: border-color 0.2s;
  }
  .add-app-card:hover { border-color: #1a73e8; color: #1a73e8; }

  /* ADD APP MODAL */
  #add-app-modal {
    position: absolute; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: flex-end; justify-content: center;
    border-radius: 28px;
  }
  #add-app-modal.show { display: flex; }
  .modal-sheet {
    background: #303134; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%;
  }
  .modal-title { font-size: 16px; font-weight: 500; color: #e8eaed; margin-bottom: 16px; }
  .modal-input {
    width: 100%; background: #3c4043; border: none; border-radius: 10px;
    padding: 12px 14px; color: #e8eaed; font-size: 15px; margin-bottom: 10px; outline: none;
  }
  .emoji-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .emoji-pick { font-size: 24px; cursor: pointer; padding: 4px; border-radius: 8px; border: 2px solid transparent; transition: border-color 0.15s; }
  .emoji-pick.selected { border-color: #1a73e8; background: rgba(26,115,232,0.15); }
  .color-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .color-pick { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; }
  .color-pick.selected { border-color: #e8eaed; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .modal-btn.cancel { background: #3c4043; color: #e8eaed; }
  .modal-btn.save { background: #1a73e8; color: white; }

  /* NOTIFICATION TOAST */
  #toast { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: #3c4043; color: #e8eaed; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; z-index: 99; }
  #toast.show { opacity: 1; }

  #wrapper { position: relative; width: 360px; }
</style>

<div id="wrapper">
  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div class="setup-logo">🔐</div>
    <div class="setup-title" id="setup-title">Set a Secret PIN</div>
    <div class="setup-subtitle" id="setup-subtitle">Enter a 6-digit PIN. Entering it on the calculator and pressing <b>=</b> will unlock your hidden app vault.</div>
    <div class="setup-step" id="setup-step">Step 1 of 2 — Enter new PIN</div>
    <div class="pin-dots" id="setup-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-btn" onclick="setupKey('1')">1</button>
      <button class="pin-btn" onclick="setupKey('2')">2</button>
      <button class="pin-btn" onclick="setupKey('3')">3</button>
      <button class="pin-btn" onclick="setupKey('4')">4</button>
      <button class="pin-btn" onclick="setupKey('5')">5</button>
      <button class="pin-btn" onclick="setupKey('6')">6</button>
      <button class="pin-btn" onclick="setupKey('7')">7</button>
      <button class="pin-btn" onclick="setupKey('8')">8</button>
      <button class="pin-btn" onclick="setupKey('9')">9</button>
      <button class="pin-btn del" onclick="setupDel()">⌫</button>
      <button class="pin-btn zero" onclick="setupKey('0')">0</button>
      <button class="pin-btn del" style="opacity:0" disabled></button>
    </div>
    <div class="error-msg" id="setup-error"></div>
  </div>

  <!-- CALCULATOR -->
  <div id="calculator">
    <div class="calc-display">
      <div class="calc-history" id="history"></div>
      <div class="calc-current" id="display">0</div>
    </div>
    <div class="calc-buttons">
      <div class="calc-row">
        <button class="calc-btn btn-func" onclick="calcInput('AC')">AC</button>
        <button class="calc-btn btn-func" onclick="calcInput('+/-')">+/-</button>
        <button class="calc-btn btn-func" onclick="calcInput('%')">%</button>
        <button class="calc-btn btn-op" onclick="calcInput('÷')">÷</button>
      </div>
      <div class="calc-row">
        <button class="calc-btn btn-num" onclick="calcInput('7')">7</button>
        <button class="calc-btn btn-num" onclick="calcInput('8')">8</button>
        <button class="calc-btn btn-num" onclick="calcInput('9')">9</button>
        <button class="calc-btn btn-op" onclick="calcInput('×')">×</button>
      </div>
      <div class="calc-row">
        <button class="calc-btn btn-num" onclick="calcInput('4')">4</button>
        <button class="calc-btn btn-num" onclick="calcInput('5')">5</button>
        <button class="calc-btn btn-num" onclick="calcInput('6')">6</button>
        <button class="calc-btn btn-op" onclick="calcInput('−')">−</button>
      </div>
      <div class="calc-row">
        <button class="calc-btn btn-num" onclick="calcInput('1')">1</button>
        <button class="calc-btn btn-num" onclick="calcInput('2')">2</button>
        <button class="calc-btn btn-num" onclick="calcInput('3')">3</button>
        <button class="calc-btn btn-op" onclick="calcInput('+')">+</button>
      </div>
      <div class="calc-row">
        <button class="calc-btn btn-num btn-zero" onclick="calcInput('0')">0</button>
        <button class="calc-btn btn-num" onclick="calcInput('.')">.</button>
        <button class="calc-btn btn-eq" onclick="calcInput('=')">=</button>
      </div>
    </div>
  </div>

  <!-- VAULT SCREEN -->
  <div id="vault-screen" style="display:none; flex-direction:column;">
    <div class="vault-header">
      <button class="vault-header-back" onclick="closeVault()">←</button>
      <div class="vault-header-title">App Vault</div>
      <button class="vault-add-btn" onclick="openAddModal()">+ Add App</button>
    </div>
    <div class="vault-apps" id="vault-apps-container">
      <div class="vault-section-title">Hidden Apps</div>
      <div class="app-grid" id="app-grid"></div>
    </div>
  </div>

  <!-- ADD APP MODAL -->
  <div id="add-app-modal">
    <div class="modal-sheet">
      <div class="modal-title">Add Hidden App</div>
      <input class="modal-input" id="app-name-input" placeholder="App name (e.g. Instagram, X)" maxlength="20" />
      <div style="font-size:12px; color:#9aa0a6; margin-bottom:8px;">Pick icon</div>
      <div class="emoji-row" id="emoji-row"></div>
      <div style="font-size:12px; color:#9aa0a6; margin-bottom:8px;">Pick color</div>
      <div class="color-row" id="color-row"></div>
      <div class="modal-btns">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn save" onclick="saveApp()">Add to Vault</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
const EMOJIS = ['📱','📸','🎵','🎮','💬','🌐','🎬','📧','🐦','📺','🔔','💡','🎙','🔐','💰','🃏','🕹','🎯','🔍','⚡'];
const COLORS = ['#e53935','#d81b60','#8e24aa','#3949ab','#1e88e5','#00897b','#43a047','#fb8c00','#f4511e','#6d4c41','#546e7a','#1a73e8'];
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

// State
let pin = localStorage.getItem('vaultPin') || '';
let vaultApps = JSON.parse(localStorage.getItem('vaultApps') || '[]');
let setupPin1 = '';
let setupPin2 = '';
let setupStage = 1;
let currentSetupInput = '';

// Calc state
let calcDisplay = '0';
let calcHistory = '';
let calcOperand1 = null;
let calcOperator = null;
let calcWaitingForOp2 = false;
let calcPinBuffer = '';
let calcJustEvaled = false;

function init() {
  buildEmojiPicker();
  buildColorPicker();
  if (pin) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('calculator').style.display = 'block';
  }
  renderVaultApps();
}

// SETUP FLOW
function setupKey(d) {
  if (currentSetupInput.length >= 6) return;
  currentSetupInput += d;
  updateSetupDots();
  if (currentSetupInput.length === 6) {
    setTimeout(() => {
      if (setupStage === 1) {
        setupPin1 = currentSetupInput;
        currentSetupInput = '';
        setupStage = 2;
        document.getElementById('setup-step').textContent = 'Step 2 of 2 — Confirm PIN';
        document.getElementById('setup-title').textContent = 'Confirm PIN';
        document.getElementById('setup-subtitle').textContent = 'Enter the same PIN again to confirm.';
        updateSetupDots();
      } else {
        setupPin2 = currentSetupInput;
        if (setupPin1 === setupPin2) {
          pin = setupPin1;
          localStorage.setItem('vaultPin', pin);
          document.getElementById('setup-screen').style.display = 'none';
          document.getElementById('calculator').style.display = 'block';
          showToast('PIN set! Enter it on the calculator + = to open vault');
        } else {
          document.getElementById('setup-error').textContent = 'PINs do not match. Try again.';
          currentSetupInput = '';
          setupStage = 1;
          setupPin1 = '';
          document.getElementById('setup-step').textContent = 'Step 1 of 2 — Enter new PIN';
          document.getElementById('setup-title').textContent = 'Set a Secret PIN';
          document.getElementById('setup-subtitle').textContent = 'Enter a 6-digit PIN. Entering it on the calculator and pressing = will unlock your hidden app vault.';
          updateSetupDots();
        }
      }
    }, 150);
  }
}

function setupDel() {
  if (currentSetupInput.length > 0) {
    currentSetupInput = currentSetupInput.slice(0, -1);
    updateSetupDots();
  }
  document.getElementById('setup-error').textContent = '';
}

function updateSetupDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('filled', i < currentSetupInput.length);
  });
}

// CALCULATOR LOGIC
function updateCalcDisplay() {
  const el = document.getElementById('display');
  el.textContent = calcDisplay;
  el.className = 'calc-current';
  if (calcDisplay.length > 9) el.classList.add('small');
  if (calcPinBuffer.length > 0) el.classList.add('pin-mode');
  document.getElementById('history').textContent = calcHistory;
}

function calcInput(key) {
  const isDigit = /^\d$/.test(key);
  const isOp = ['÷','×','−','+'].includes(key);

  if (key === 'AC') {
    calcDisplay = '0'; calcHistory = '';
    calcOperand1 = null; calcOperator = null;
    calcWaitingForOp2 = false; calcPinBuffer = '';
    calcJustEvaled = false;
  } else if (key === '+/-') {
    if (calcDisplay !== '0') calcDisplay = calcDisplay.startsWith('-') ? calcDisplay.slice(1) : '-' + calcDisplay;
    calcPinBuffer = '';
  } else if (key === '%') {
    calcDisplay = String(parseFloat(calcDisplay) / 100);
    calcPinBuffer = '';
  } else if (isDigit) {
    if (calcJustEvaled) { calcDisplay = key; calcJustEvaled = false; calcPinBuffer = ''; }
    else if (calcWaitingForOp2) { calcDisplay = key; calcWaitingForOp2 = false; }
    else { calcDisplay = calcDisplay === '0' ? key : (calcDisplay.length < 12 ? calcDisplay + key : calcDisplay); }
    // PIN detection
    calcPinBuffer += key;
    if (calcPinBuffer.length > 6) calcPinBuffer = calcPinBuffer.slice(-6);
    const el = document.getElementById('display');
    if (calcPinBuffer === pin) el.classList.add('pin-mode');
    else el.classList.remove('pin-mode');
  } else if (key === '.') {
    if (!calcDisplay.includes('.')) calcDisplay += '.';
    calcPinBuffer = '';
  } else if (isOp) {
    calcPinBuffer = '';
    if (calcOperand1 !== null && !calcWaitingForOp2) {
      const res = compute(calcOperand1, parseFloat(calcDisplay), calcOperator);
      calcDisplay = formatResult(res);
    }
    calcOperand1 = parseFloat(calcDisplay);
    calcOperator = key;
    calcWaitingForOp2 = true;
    calcHistory = calcDisplay + ' ' + key;
    calcJustEvaled = false;
  } else if (key === '=') {
    // Check PIN vault trigger
    if (calcPinBuffer === pin && calcDisplay === pin) {
      openVault(); calcPinBuffer = ''; return;
    }
    // Check if last 6 digits form pin
    if (calcDisplay === pin) {
      openVault(); calcPinBuffer = ''; return;
    }
    if (calcOperand1 !== null) {
      const op2 = parseFloat(calcDisplay);
      calcHistory = calcOperand1 + ' ' + calcOperator + ' ' + op2 + ' =';
      const res = compute(calcOperand1, op2, calcOperator);
      calcDisplay = formatResult(res);
      calcOperand1 = null; calcOperator = null; calcWaitingForOp2 = false;
      calcJustEvaled = true;
    }
    calcPinBuffer = '';
  }
  updateCalcDisplay();
}

function compute(a, b, op) {
  if (op === '+') return a + b;
  if (op === '−') return a - b;
  if (op === '×') return a * b;
  if (op === '÷') return b === 0 ? NaN : a / b;
  return b;
}
function formatResult(n) {
  if (isNaN(n)) return 'Error';
  if (!isFinite(n)) return 'Error';
  const s = parseFloat(n.toFixed(10)).toString();
  return s.length > 12 ? parseFloat(n.toPrecision(8)).toString() : s;
}

// VAULT
function openVault() {
  document.getElementById('calculator').style.display = 'none';
  const v = document.getElementById('vault-screen');
  v.style.display = 'flex';
  v.style.flexDirection = 'column';
  renderVaultApps();
  showToast('Vault unlocked');
}
function closeVault() {
  document.getElementById('vault-screen').style.display = 'none';
  document.getElementById('calculator').style.display = 'block';
  calcDisplay = '0'; calcHistory = ''; calcPinBuffer = '';
  calcOperand1 = null; calcOperator = null; calcWaitingForOp2 = false;
  calcJustEvaled = false;
  updateCalcDisplay();
}

function renderVaultApps() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = '';
  vaultApps.forEach((app, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'app-icon-wrap';
    const notifBadge = app.notif ? `<div class="badge">${app.notif}</div>` : '';
    wrap.innerHTML = `<div class="app-icon" style="background:${app.color}">${app.icon}${notifBadge}</div><div class="app-icon-label">${app.name}</div>`;
    wrap.addEventListener('click', () => showToast(`Opening ${app.name}...`));
    wrap.addEventListener('contextmenu', (e) => { e.preventDefault(); if(confirm(`Remove ${app.name} from vault?`)) { vaultApps.splice(i,1); localStorage.setItem('vaultApps', JSON.stringify(vaultApps)); renderVaultApps(); }});
    grid.appendChild(wrap);
  });
  // Add button
  const addWrap = document.createElement('div');
  addWrap.className = 'app-icon-wrap';
  addWrap.innerHTML = `<div class="add-app-card">+</div><div class="app-icon-label" style="color:#9aa0a6">Add</div>`;
  addWrap.addEventListener('click', openAddModal);
  grid.appendChild(addWrap);
}

// ADD APP MODAL
function openAddModal() {
  document.getElementById('add-app-modal').classList.add('show');
  document.getElementById('app-name-input').focus();
}
function closeModal() {
  document.getElementById('add-app-modal').classList.remove('show');
  document.getElementById('app-name-input').value = '';
}
function buildEmojiPicker() {
  const row = document.getElementById('emoji-row');
  EMOJIS.forEach(e => {
    const btn = document.createElement('span');
    btn.className = 'emoji-pick' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-pick').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
    });
    row.appendChild(btn);
  });
}
function buildColorPicker() {
  const row = document.getElementById('color-row');
  COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'color-pick' + (c === selectedColor ? ' selected' : '');
    btn.style.background = c;
    btn.addEventListener('click', () => {
      selectedColor = c;
      document.querySelectorAll('.color-pick').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
    });
    row.appendChild(btn);
  });
}
function saveApp() {
  const name = document.getElementById('app-name-input').value.trim();
  if (!name) { showToast('Please enter an app name'); return; }
  const notif = Math.random() > 0.5 ? Math.floor(Math.random() * 20 + 1) : 0;
  vaultApps.push({ name, icon: selectedEmoji, color: selectedColor, notif });
  localStorage.setItem('vaultApps', JSON.stringify(vaultApps));
  closeModal();
  renderVaultApps();
  showToast(`${name} added to vault!`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
